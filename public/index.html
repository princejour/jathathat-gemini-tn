<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولّد الجذاذات التربوية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap');
:root{--ink:#111229;--muted:#6b6d83;--paper:#f7f2e9;--card:#fffdf8;--line:#ded6c7;--gold:#c1903f;--blue:#233b6e;--green:#1f7a55;--red:#9a2e2e;--shadow:0 18px 45px rgba(20,18,43,.11)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;background:radial-gradient(circle at top,#fbf5e9,#f7f2e9 45%,#efe7dc);color:var(--ink);direction:rtl;min-height:100vh;line-height:1.7}.top{background:#111229;color:white;border-bottom:1px solid rgba(255,255,255,.08)}.topin{height:62px;max-width:1120px;margin:auto;padding:0 18px;display:flex;align-items:center;justify-content:flex-end}.brand{font-family:'Amiri',serif;font-size:24px;font-weight:700;display:flex;gap:10px;align-items:center}.dot{width:11px;height:11px;background:linear-gradient(135deg,#f2c66f,var(--gold));border-radius:50%;box-shadow:0 0 0 7px rgba(193,144,63,.13)}.hero{background:linear-gradient(145deg,#161733,#24305d 64%,#174e62);color:white;text-align:center;padding:46px 16px 44px}.hero small{color:#dfb96c;font-weight:800}.hero h1{font-family:'Amiri',serif;font-size:clamp(34px,8vw,56px);line-height:1.15;margin-top:10px;text-shadow:0 8px 25px rgba(0,0,0,.22)}.main{max-width:1120px;margin:auto;padding:24px 14px 54px;display:grid;grid-template-columns:390px 1fr;gap:22px;align-items:start}.card{background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:30px;box-shadow:var(--shadow);overflow:hidden}.form{padding:20px;position:sticky;top:16px}.head{display:flex;gap:12px;align-items:center;margin-bottom:18px}.ico{width:42px;height:42px;border-radius:15px;background:#eef4fb;border:1px solid #d9e6f3;display:flex;align-items:center;justify-content:center;font-size:21px}.head b{font-size:19px}.field{margin-bottom:14px}.field label{display:block;font-weight:900;color:#50536b;margin-bottom:7px}.req{color:var(--gold)}input,select,textarea{width:100%;font-family:'Cairo',sans-serif;font-size:15px;color:var(--ink);background:#fffaf1;border:1px solid var(--line);border-radius:18px;padding:13px 14px;outline:none;direction:rtl}textarea{min-height:92px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#87a7ce;box-shadow:0 0 0 4px rgba(35,59,110,.11);background:#fff}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.mode{background:#eef4fb;border:1px solid #d7e4f1;border-radius:22px;padding:12px;margin:16px 0}.mode-title{font-weight:900;color:var(--blue);margin-bottom:8px}.opt{display:flex;gap:9px;align-items:flex-start;background:white;border:1px solid var(--line);border-radius:16px;padding:10px;margin-top:8px}.opt input{width:auto;margin-top:6px}.opt b{display:block;font-size:13px}.opt span{display:block;color:var(--muted);font-size:11px}.sep{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:17px 0}.btn{width:100%;border:0;border-radius:22px;padding:16px;background:linear-gradient(135deg,#111229,#27315d);color:white;font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;box-shadow:0 14px 28px rgba(17,18,41,.22);display:flex;justify-content:center;align-items:center;gap:10px}.btn:disabled{opacity:.6}.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}@keyframes spin{to{transform:rotate(360deg)}}.result{display:flex;flex-direction:column;gap:16px}.welcome{padding:42px 22px;text-align:center;background:linear-gradient(135deg,#eef4fb,#fffdf8);border:1px solid #d7e4f1;border-radius:30px;box-shadow:0 8px 25px rgba(20,18,43,.08)}.welcome .big{font-size:44px}.welcome h2{font-family:'Amiri',serif;color:var(--blue);font-size:30px}.welcome p{color:var(--muted)}.err{display:none;background:#fdecec;border:1px solid #efc6c6;color:var(--red);border-radius:20px;padding:14px}.out{display:none}.tools{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;background:#f7f0e6;border-bottom:1px solid var(--line);padding:13px 16px}.title{font-weight:900;color:#50536b}.acts{display:flex;gap:7px;flex-wrap:wrap}.act{font-family:'Cairo';font-weight:800;border:1px solid var(--line);background:white;border-radius:12px;padding:8px 12px;color:#50536b}.act.dark{background:#111229;color:white}.act.ok{background:var(--green);color:white}.paper{background:white;padding:36px 34px;min-height:300px;position:relative}.paper:before{content:'';position:absolute;top:18px;right:18px;left:18px;border-top:3px double rgba(17,18,41,.18)}.body{white-space:pre-wrap;line-height:2.02;font-size:14px;padding-top:14px}.cursor{display:inline-block;width:2px;height:16px;background:var(--blue);animation:blink .9s step-end infinite}@keyframes blink{50%{opacity:0}}.meta{display:flex;gap:7px;flex-wrap:wrap;background:#fbf8f1;border-top:1px solid var(--line);padding:11px 16px}.pill{font-size:11px;font-weight:800;border:1px solid var(--line);background:#efe8dc;color:#50536b;border-radius:999px;padding:4px 10px}.pill.hi{background:#e8f0f9;color:var(--blue)}.footer{text-align:center;color:#999;font-size:11px;margin-top:14px}@media(max-width:880px){.main{grid-template-columns:1fr}.form{position:static}.hero{padding:38px 16px}.topin{height:58px}.brand{font-size:22px}}@media print{.top,.hero,.form,.welcome,.err,.tools,.meta,.footer{display:none!important}.main{display:block;padding:0}.out{display:block!important;border:0;box-shadow:none}.paper{padding:0}.paper:before{display:none}.body{font-size:12px;line-height:1.8;padding:0}}
</style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand"><span class="dot"></span><span>مولّد الجذاذات التربوية</span></div></div></header>
<section class="hero"><small>أداة تربوية احترافية</small><h1>جذاذتك في ثوانٍ<br>لا في ساعات</h1></section>
<main class="main">
<aside class="card form">
<div class="head"><div class="ico">📘</div><div><b>بيانات الدرس</b></div></div>
<div class="field"><label>المادة الدراسية <span class="req">*</span></label><input id="f_matiere" type="text" placeholder="مثال: الإيقاظ العلمي، Economie، English..."></div>
<div class="field"><label>المستوى الدراسي <span class="req">*</span></label><select id="f_niveau"><option value="">— اختر المستوى —</option><optgroup label="الابتدائي"><option>السنة الأولى ابتدائي</option><option>السنة الثانية ابتدائي</option><option>السنة الثالثة ابتدائي</option><option>السنة الرابعة ابتدائي</option><option>السنة الخامسة ابتدائي</option><option>السنة السادسة ابتدائي</option></optgroup><optgroup label="الإعدادي"><option>السنة السابعة أساسي</option><option>السنة الثامنة أساسي</option><option>السنة التاسعة أساسي</option></optgroup><optgroup label="الثانوي"><option>السنة الأولى ثانوي</option><option>السنة الثانية ثانوي</option><option>السنة الثالثة ثانوي</option><option>السنة الرابعة ثانوي — بكالوريا</option></optgroup></select></div>
<div class="field"><label>عنوان الدرس <span class="req">*</span></label><input id="f_titre" type="text" placeholder="عنوان الدرس"></div>
<div class="row"><div class="field"><label>مدة الحصة</label><select id="f_duree"><option>30 دقيقة</option><option selected>45 دقيقة</option><option>55 دقيقة</option><option>60 دقيقة</option><option>90 دقيقة</option></select></div><div class="field"><label>حجم الفوج</label><select id="f_effectif"><option>أقل من 20 تلميذاً</option><option selected>20–30 تلميذاً</option><option>أكثر من 30 تلميذاً</option></select></div></div>
<div class="field"><label>طريقة التدريس</label><select id="f_approche"><option>المقاربة بالكفاءات</option><option>التعلم النشط</option><option>التعلم التعاوني</option><option>حل المشكلات</option><option>الاكتشاف الموجه</option><option>المقاربة النصية</option><option>التعليم المباشر</option></select></div>
<div class="mode"><div class="mode-title">طريقة التوليد</div><label class="opt"><input type="radio" name="mode" value="title" checked onchange="toggleSource()"><div><b>من عنوان الدرس</b><span>مناسب للتحضير السريع.</span></div></label><label class="opt"><input type="radio" name="mode" value="source" onchange="toggleSource()"><div><b>من نص الدرس</b><span>أدق عند توفر محتوى الدرس.</span></div></label></div>
<div id="sourceBox" style="display:none"><div class="field"><label>نص الدرس</label><textarea id="f_lessonText" placeholder="ألصق نص الدرس هنا عند الحاجة."></textarea></div></div>
<div class="sep"></div>
<div class="field"><label>المكتسبات القبلية</label><input id="f_prereq" type="text" placeholder="اختياري"></div>
<div class="field"><label>الوسائل المتاحة</label><input id="f_moyens" type="text" placeholder="اختياري"></div>
<div class="field"><label>ملاحظات خاصة</label><textarea id="f_notes" placeholder="اختياري"></textarea></div>
<button class="btn" id="genBtn" onclick="doGenerate()"><span class="spin" id="spin"></span><span id="btnIcon">✦</span><span id="btnTxt">توليد الجذاذة</span></button>
</aside>
<section class="result">
<div class="err" id="errCard"><span id="errTxt">حدث خطأ.</span></div>
<div class="welcome" id="welcomeCard"><div class="big">📝</div><h2>جاهز للتوليد</h2><p>أدخل بيانات الدرس ثم اضغط زر التوليد.</p></div>
<div class="card out" id="outCard"><div class="tools"><span class="title">📋 الجذاذة التربوية</span><div class="acts"><button class="act" onclick="doCopy(this)">نسخ</button><button class="act" onclick="downloadTxt()">تحميل</button><button class="act" onclick="window.print()">طباعة</button><button class="act dark" onclick="doGenerate()">توليد جديد</button></div></div><div class="paper"><div class="body" id="outBody"></div></div><div class="meta" id="metaStrip"></div></div>
<div class="footer">walid ben jemaa</div>
</section>
</main>
<script>
const G=id=>document.getElementById(id),MODEL_NAME='gemini-3.5-flash';
const KNOWN={ar:{name:'العربية',dir:'rtl'},fr:{name:'Français',dir:'ltr'},en:{name:'English',dir:'ltr'},de:{name:'Deutsch',dir:'ltr'},it:{name:'Italiano',dir:'ltr'},es:{name:'Español',dir:'ltr'},zh:{name:'中文',dir:'ltr'},ja:{name:'日本語',dir:'ltr'},ko:{name:'한국어',dir:'ltr'},ru:{name:'Русский',dir:'ltr'},tr:{name:'Türkçe',dir:'ltr'},pt:{name:'Português',dir:'ltr'},he:{name:'עברית',dir:'rtl'},fa:{name:'فارسی',dir:'rtl'},ur:{name:'اردو',dir:'rtl'},amazigh:{name:'Tamaziɣt',dir:'ltr'}};
const LANGUAGE_HINTS=[{key:'zh',rx:/الصينية|صيني|الصيني|chinese|mandarin|中文|汉语|漢語/},{key:'ja',rx:/اليابانية|ياباني|japanese|日本語/},{key:'ko',rx:/الكورية|كوري|korean|한국어/},{key:'es',rx:/الإسبانية|الاسبانية|إسباني|اسباني|spanish|español|castellano/},{key:'ru',rx:/الروسية|روسي|russian|русский/},{key:'tr',rx:/التركية|تركي|turkish|türkçe/},{key:'pt',rx:/البرتغالية|برتغالي|portuguese|português/},{key:'de',rx:/الألمانية|الالمانية|ألماني|الماني|deutsch|german|allemand/},{key:'it',rx:/الإيطالية|الايطالية|إيطالي|ايطالي|italiano|italian/},{key:'en',rx:/الإنجليزية|الانقليزية|الانجليزية|إنقليزية|إنجليزية|انقليزية|english|anglais/},{key:'fr',rx:/الفرنسية|فرنسي|français|francais|french|économie|economie|pib/},{key:'he',rx:/العبرية|عبري|hebrew|עברית/},{key:'fa',rx:/الفارسية|فارسي|persian|farsi|فارسی/},{key:'ur',rx:/الأردية|الاردية|أردو|اردو|urdu|اردو/},{key:'amazigh',rx:/الأمازيغية|الامازيغية|أمازيغية|امازيغية|tamazight|tamaziɣt/},{key:'ar',rx:/العربية|لغة عربية|التربية الإسلامية|التربية الاسلامية|إسلامية|اسلامية|الإيقاظ العلمي|الرياضيات|التاريخ|الجغرافيا|التربية المدنية/}];
const FIXED={fr:{'السنة الثانية ثانوي':'2e année secondaire','45 دقيقة':'45 minutes','20–30 تلميذاً':'20–30 élèves','المقاربة بالكفاءات':'approche par compétences'},en:{'السنة الثانية ثانوي':'2nd year secondary','45 دقيقة':'45 minutes','20–30 تلميذاً':'20–30 students','المقاربة بالكفاءات':'competency-based approach'},es:{'السنة الثانية ثانوي':'2.º año de secundaria','45 دقيقة':'45 minutos','20–30 تلميذاً':'20–30 alumnos','المقاربة بالكفاءات':'enfoque por competencias'},zh:{'السنة الثانية ثانوي':'高中二年级','45 دقيقة':'45分钟','20–30 تلميذاً':'20–30名学生','المقاربة بالكفاءات':'基于能力的教学法'}};
function selectedMode(){return document.querySelector('input[name="mode"]:checked')?.value||'title'}function toggleSource(){G('sourceBox').style.display=selectedMode()==='source'?'block':'none'}function getForm(){return{matiere:G('f_matiere').value.trim(),niveau:G('f_niveau').value,titre:G('f_titre').value.trim(),duree:G('f_duree').value,effectif:G('f_effectif').value,approche:G('f_approche').value,prereq:G('f_prereq').value.trim(),moyens:G('f_moyens').value.trim(),notes:G('f_notes').value.trim(),lessonText:G('f_lessonText').value.trim(),mode:selectedMode()}}
function detectLanguage(input){const subject=(input.matiere||'').toLowerCase(),combined=((input.matiere||'')+' '+(input.titre||'')+' '+(input.lessonText||'')).toLowerCase();for(const item of LANGUAGE_HINTS){if(item.rx.test(subject))return {key:item.key,...KNOWN[item.key]}}for(const item of LANGUAGE_HINTS){if(item.rx.test(combined))return {key:item.key,...KNOWN[item.key]}}if(/[\u0600-\u06ff]/.test(combined)&&!/[a-zàâçéèêëîïôùûüÿñæœ]/i.test(combined))return {key:'ar',...KNOWN.ar};if(/[àâçéèêëîïôùûüÿœæ]/i.test(combined))return {key:'fr',...KNOWN.fr};if(/[a-z]/i.test(combined))return {key:'en',...KNOWN.en};return {key:'ar',...KNOWN.ar}}
function trFixed(v,key){return key==='ar'?v:(FIXED[key]&&FIXED[key][v])||v}function localizeInput(input,target){const out={...input};out.niveau=trFixed(input.niveau,target.key);out.duree=trFixed(input.duree,target.key);out.effectif=trFixed(input.effectif,target.key);out.approche=trFixed(input.approche,target.key);return out}function setOutputDirection(target){G('outBody').style.direction=target.dir||'ltr';G('outBody').style.textAlign=(target.dir==='rtl')?'right':'left'}function setLoading(on){G('genBtn').disabled=on;G('spin').style.display=on?'inline-block':'none';G('btnIcon').style.display=on?'none':'inline';G('btnTxt').textContent=on?'جارٍ التوليد...':'توليد الجذاذة'}function showErr(msg){G('errTxt').textContent=msg;G('errCard').style.display='block'}function animateText(text,done){const body=G('outBody');body.innerHTML='';let i=0,cur=document.createElement('span');cur.className='cursor';(function tick(){if(i<text.length){body.textContent=text.slice(0,i+=10);body.appendChild(cur);setTimeout(tick,5)}else{body.textContent=text;done&&done()}})()}function buildMeta(form,target){const view=localizeInput(form,target),today=new Date().toLocaleDateString('ar-TN',{year:'numeric',month:'long',day:'numeric'});G('metaStrip').innerHTML=[{l:view.matiere,hi:true},{l:view.niveau},{l:target.name},{l:view.duree},{l:today}].map(p=>`<span class="pill${p.hi?' hi':''}">${escapeHtml(p.l)}</span>`).join('')}async function doCopy(btn){const txt=G('outBody').textContent;try{await navigator.clipboard.writeText(txt)}catch{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}const old=btn.innerHTML;btn.innerHTML='تم النسخ';btn.classList.add('ok');setTimeout(()=>{btn.innerHTML=old;btn.classList.remove('ok')},1500)}function downloadTxt(){const txt=G('outBody').textContent.trim();if(!txt){showErr('لا توجد جذاذة للتحميل.');return}const blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jathatha.txt';document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove()}function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function normalizeError(msg){if(/permission|403|401|not.*enabled/i.test(msg))return'يجب تفعيل خدمة الذكاء الاصطناعي في إعدادات المشروع.';if(/quota|429|rate/i.test(msg))return'تم تجاوز حد الاستعمال المجاني أو الحد المسموح.';if(/model|404/i.test(msg))return'النموذج غير متاح حالياً. حاول لاحقاً.';if(/init|config|firebase/i.test(msg))return'لم أستطع قراءة إعدادات المشروع. جرّب بعد النشر على رابط الاستضافة.';return msg}document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')doGenerate()});
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js';
import { getAI, getGenerativeModel, GoogleAIBackend } from 'https://www.gstatic.com/firebasejs/12.6.0/firebase-ai.js';
let firebaseApp=null;async function getFirebaseApp(){if(firebaseApp)return firebaseApp;const resp=await fetch('/__/firebase/init.json',{cache:'no-store'});if(!resp.ok)throw new Error('Firebase init config not available');const cfg=await resp.json();firebaseApp=initializeApp(cfg);return firebaseApp}function structureInstruction(target){return `Use the standard pedagogical lesson-plan structure, but translate every heading and label into ${target.name}: lesson plan heading; general information with subject, level, lesson, duration, teaching approach, group size; target competency; operational objectives; prerequisites; teaching aids and materials; lesson procedure with warm-up, construction of learning, practice/consolidation, assessment/summary; pedagogical guidance. Fill all sections with real content.`}function buildPrompt(input,target){const view=localizeInput(input,target),source=input.mode==='source'&&input.lessonText?`\nنص الدرس/المصدر المعتمد:\n${input.lessonText}`:'';return `أنت خبير تربوي متخصص في إعداد الجذاذات. أنشئ جذاذة تربوية كاملة.\n\nتعليمات اللغة - إلزامية جداً:\n- استنتجنا أن لغة الجذاذة المطلوبة هي: ${target.name}.\n- اكتب الجذاذة النهائية كاملة بهذه اللغة فقط: ${target.name}.\n- إذا كانت المادة مكتوبة بالعربية كاسم لغة، مثل الصينية أو الإسبانية أو الروسية، فهذا يعني أن الجذاذة يجب أن تُكتب بلغة تلك المادة نفسها، لا بالعربية.\n- لا تترك عناوين عربية ولا قيماً عربية داخل الجذاذة إذا كانت اللغة المطلوبة غير العربية. ترجم المستوى، المدة، الطريقة، الفوج، المكتسبات، الوسائل والملاحظات إلى ${target.name}.\n\nالمعطيات:\n- المادة الأصلية: ${input.matiere}\n- المادة المستعملة في الجذاذة: ${view.matiere}\n- المستوى الأصلي: ${input.niveau}\n- المستوى المستعمل: ${view.niveau}\n- الدرس: ${input.titre}\n- المدة: ${view.duree}\n- الفوج: ${view.effectif}\n- الطريقة: ${view.approche}\n- المكتسبات القبلية: ${input.prereq||'غير محددة'}\n- الوسائل: ${input.moyens||'وسائل القسم المعتادة'}\n${input.notes?'- ملاحظات خاصة: '+input.notes:''}${source}\n\nقيود تربوية:\n- التزم حصراً بعنوان الدرس: ${input.titre}\n- لا تضف دروساً أخرى ولا تخرج عن المادة: ${input.matiere}\n- اجعل المحتوى مناسباً للمستوى الدراسي.\n- اجعل المحتوى عملياً وصالحاً مباشرة لكراس إعداد الدروس والطباعة.\n\n${structureInstruction(target)}\n\nاكتب النتيجة النهائية مباشرة دون مقدمة خارجية ودون اعتذار.`}window.doGenerate=async function(){const form=getForm(),target=detectLanguage(form);G('errCard').style.display='none';if(!form.matiere||!form.niveau||!form.titre){showErr('يرجى ملء الحقول الإلزامية: المادة والمستوى وعنوان الدرس.');return}setLoading(true);setOutputDirection(target);G('welcomeCard').style.display='none';G('outCard').style.display='block';G('outBody').innerHTML='<span class="cursor"></span>';G('metaStrip').innerHTML='';try{const app=await getFirebaseApp(),ai=getAI(app,{backend:new GoogleAIBackend()}),model=getGenerativeModel(ai,{model:MODEL_NAME,generationConfig:{temperature:0.25,topP:0.9,maxOutputTokens:4500},systemInstruction:`أنت مساعد تربوي محترف. يجب أن تكتب الناتج كاملاً بلغة واحدة فقط هي: ${target.name}. لا تستعمل العربية إذا كانت المادة لغة أجنبية مكتوبة بالعربية مثل الصينية أو الإسبانية.`}),result=await model.generateContent(buildPrompt(form,target)),text=(result.response.text()||'').trim();if(!text)throw new Error('لم يتم استلام أي محتوى.');animateText(text,()=>{buildMeta(form,target);setLoading(false)})}catch(e){showErr(normalizeError(e.message||String(e)||'تعذّر التوليد.'));G('outCard').style.display='none';G('welcomeCard').style.display='block';setLoading(false)}}
</script>
