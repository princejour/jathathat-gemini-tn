<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مولّد الجذاذات التربوية</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap');
:root{--navy:#101229;--navy2:#1b2450;--blue:#1d5c73;--gold:#c59a4a;--paper:#f7f1e6;--card:#fffdf8;--line:#ded4c3;--text:#15172f;--muted:#6d7085;--soft:#f2eadf;--green:#16724f;--red:#9a2e2e;--shadow:0 22px 55px rgba(16,18,41,.15);--shadow2:0 12px 28px rgba(16,18,41,.09)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;background:linear-gradient(180deg,#f8f2e8 0%,#f4eadc 100%);color:var(--text);direction:rtl;min-height:100vh;line-height:1.7}.appbar{height:64px;background:rgba(16,18,41,.98);color:#fff;display:flex;align-items:center;position:sticky;top:0;z-index:30;border-bottom:1px solid rgba(255,255,255,.08)}.appbar-inner{width:min(1120px,100%);margin:auto;padding:0 18px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px;font-family:'Amiri',serif;font-weight:700;font-size:24px}.mark{width:34px;height:34px;border-radius:14px;background:linear-gradient(135deg,var(--gold),#f3d38a);box-shadow:0 0 0 8px rgba(197,154,74,.13)}.hero{position:relative;overflow:hidden;color:white;background:radial-gradient(circle at 18% 10%,rgba(197,154,74,.22),transparent 28%),linear-gradient(145deg,var(--navy) 0%,var(--navy2) 58%,var(--blue) 100%);padding:54px 20px 70px;text-align:center}.hero::after{content:'';position:absolute;inset:auto -20% -70px -20%;height:160px;background:radial-gradient(ellipse at center,rgba(255,255,255,.12),transparent 68%)}.kicker{color:#dcbc78;font-weight:900;letter-spacing:.3px}.hero h1{font-family:'Amiri',serif;font-size:clamp(38px,9vw,64px);line-height:1.08;margin-top:12px;text-shadow:0 12px 32px rgba(0,0,0,.28)}.layout{width:min(1120px,100%);margin:-34px auto 0;padding:0 14px 60px;display:grid;grid-template-columns:390px 1fr;gap:22px;align-items:start}.panel{position:relative;background:rgba(255,253,248,.96);border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow);overflow:hidden}.form{padding:24px;position:sticky;top:82px}.panel-title{display:flex;align-items:center;gap:12px;margin-bottom:22px}.tile{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#f2eadf,#fff);border:1px solid var(--line);position:relative}.tile::before{content:'';position:absolute;inset:10px;border-radius:8px;border:2px solid var(--gold)}.panel-title b{font-size:21px}.field{margin-bottom:15px}.field label{display:block;color:#46495f;font-weight:900;margin-bottom:8px}.req{color:var(--gold)}input,select,textarea{width:100%;font-family:'Cairo',sans-serif;font-size:15px;color:var(--text);background:#fffaf2;border:1px solid var(--line);border-radius:20px;padding:14px 15px;outline:none;direction:rtl;transition:.18s}textarea{min-height:110px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#7ca5c5;box-shadow:0 0 0 4px rgba(29,92,115,.12);background:#fff}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.mode{background:linear-gradient(135deg,#f6efe5,#fffaf2);border:1px solid var(--line);border-radius:24px;padding:13px;margin:18px 0}.mode-title{font-weight:900;color:#46495f;margin-bottom:9px}.choice{display:flex;align-items:center;gap:10px;background:white;border:1px solid var(--line);border-radius:17px;padding:11px 12px;margin-top:8px;font-weight:800}.choice input{width:auto}.sep{height:1px;background:linear-gradient(90deg,transparent,var(--line),transparent);margin:18px 0}.btn{width:100%;border:0;border-radius:24px;padding:17px;background:linear-gradient(135deg,#101229,#2a3568);color:white;font-family:'Cairo',sans-serif;font-size:18px;font-weight:900;letter-spacing:.2px;box-shadow:0 18px 34px rgba(16,18,41,.24);display:flex;align-items:center;justify-content:center;gap:10px}.btn:disabled{opacity:.62}.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.35);border-top-color:white;border-radius:50%;animation:spin .75s linear infinite;display:none}@keyframes spin{to{transform:rotate(360deg)}}.result{display:flex;flex-direction:column;gap:16px}.welcome{padding:46px 24px;text-align:center;background:linear-gradient(135deg,#fffdf8,#f4efe6);border:1px solid var(--line);border-radius:34px;box-shadow:var(--shadow2)}.welcome h2{font-family:'Amiri',serif;font-size:34px;color:#233b6e}.err{display:none;background:#fdecec;border:1px solid #efc6c6;color:var(--red);border-radius:20px;padding:14px}.out{display:none}.tools{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;background:linear-gradient(135deg,#f4eadc,#fffaf2);border-bottom:1px solid var(--line);padding:14px 18px}.title{font-weight:900;color:#46495f}.acts{display:flex;gap:8px;flex-wrap:wrap}.act{font-family:'Cairo';font-weight:800;border:1px solid var(--line);background:white;border-radius:13px;padding:8px 13px;color:#46495f}.act.dark{background:var(--navy);color:white;border-color:var(--navy)}.act.ok{background:var(--green);color:white}.paper{background:white;min-height:320px;padding:42px 38px;position:relative}.paper::before{content:'';position:absolute;top:20px;right:20px;left:20px;border-top:3px double rgba(16,18,41,.17)}.body{white-space:pre-wrap;line-height:2.04;font-size:14px;padding-top:14px}.cursor{display:inline-block;width:2px;height:16px;background:var(--blue);animation:blink .9s step-end infinite}@keyframes blink{50%{opacity:0}}.meta{display:flex;gap:7px;flex-wrap:wrap;background:#fbf7ef;border-top:1px solid var(--line);padding:12px 18px}.pill{font-size:11px;font-weight:900;border:1px solid var(--line);background:#f2eadf;color:#46495f;border-radius:999px;padding:4px 11px}.pill.hi{background:#eaf2fb;color:#1d5c73}.footer{text-align:center;color:#9b988e;font-size:11px;margin-top:14px}@media(max-width:880px){.layout{grid-template-columns:1fr}.form{position:static}.hero{padding:44px 16px 58px}.brand{font-size:22px}.row{grid-template-columns:1fr}}@media print{.appbar,.hero,.form,.welcome,.err,.tools,.meta,.footer{display:none!important}.layout{display:block;margin:0;padding:0}.out{display:block!important;border:0;box-shadow:none}.paper{padding:0}.paper::before{display:none}.body{font-size:12px;line-height:1.8;padding:0}}
</style>
</head>
<body>
<header class="appbar"><div class="appbar-inner"><div></div><div class="brand"><span class="mark"></span><span>مولّد الجذاذات التربوية</span></div></div></header>
<section class="hero"><div class="kicker">أداة تربوية احترافية</div><h1>جذاذتك في ثوانٍ<br>لا في ساعات</h1></section>
<main class="layout">
<aside class="panel form">
<div class="panel-title"><span class="tile"></span><b>بيانات الدرس</b></div>
<div class="field"><label>المادة الدراسية <span class="req">*</span></label><input id="f_matiere" type="text"></div>
<div class="field"><label>المستوى الدراسي <span class="req">*</span></label><select id="f_niveau"><option value="">— اختر المستوى —</option><optgroup label="الابتدائي"><option>السنة الأولى ابتدائي</option><option>السنة الثانية ابتدائي</option><option>السنة الثالثة ابتدائي</option><option>السنة الرابعة ابتدائي</option><option>السنة الخامسة ابتدائي</option><option>السنة السادسة ابتدائي</option></optgroup><optgroup label="الإعدادي"><option>السنة السابعة أساسي</option><option>السنة الثامنة أساسي</option><option>السنة التاسعة أساسي</option></optgroup><optgroup label="الثانوي"><option>السنة الأولى ثانوي</option><option>السنة الثانية ثانوي</option><option>السنة الثالثة ثانوي</option><option>السنة الرابعة ثانوي — بكالوريا</option></optgroup></select></div>
<div class="field"><label>عنوان الدرس <span class="req">*</span></label><input id="f_titre" type="text"></div>
<div class="row"><div class="field"><label>مدة الحصة</label><select id="f_duree"><option>30 دقيقة</option><option selected>45 دقيقة</option><option>55 دقيقة</option><option>60 دقيقة</option><option>90 دقيقة</option></select></div><div class="field"><label>طريقة التدريس</label><select id="f_approche"><option>المقاربة بالكفاءات</option><option>التعلم النشط</option><option>التعلم التعاوني</option><option>حل المشكلات</option><option>الاكتشاف الموجه</option><option>المقاربة النصية</option><option>التعليم المباشر</option></select></div></div>
<div class="mode"><div class="mode-title">طريقة التوليد</div><label class="choice"><input type="radio" name="mode" value="title" checked onchange="toggleSource()"><span>من عنوان الدرس</span></label><label class="choice"><input type="radio" name="mode" value="source" onchange="toggleSource()"><span>من نص الدرس</span></label></div>
<div id="sourceBox" style="display:none"><div class="field"><label>نص الدرس</label><textarea id="f_lessonText"></textarea></div></div>
<div class="sep"></div>
<div class="field"><label>المكتسبات القبلية</label><input id="f_prereq" type="text"></div>
<div class="field"><label>الوسائل المتاحة</label><input id="f_moyens" type="text"></div>
<div class="field"><label>ملاحظات خاصة</label><textarea id="f_notes"></textarea></div>
<button class="btn" id="genBtn" onclick="doGenerate()"><span class="spin" id="spin"></span><span id="btnTxt">توليد الجذاذة</span></button>
</aside>
<section class="result">
<div class="err" id="errCard"><span id="errTxt">حدث خطأ.</span></div>
<div class="welcome" id="welcomeCard"><h2>جاهز للتوليد</h2></div>
<div class="panel out" id="outCard"><div class="tools"><span class="title">الجذاذة التربوية</span><div class="acts"><button class="act" onclick="doCopy(this)">نسخ</button><button class="act" onclick="downloadTxt()">تحميل</button><button class="act" onclick="window.print()">طباعة</button><button class="act dark" onclick="doGenerate()">توليد جديد</button></div></div><div class="paper"><div class="body" id="outBody"></div></div><div class="meta" id="metaStrip"></div></div>
<div class="footer">walid ben jemaa</div>
</section>
</main>
<script>
const G=id=>document.getElementById(id),MODEL_NAME='gemini-3.5-flash';
const KNOWN={ar:{name:'العربية',dir:'rtl'},fr:{name:'Français',dir:'ltr'},en:{name:'English',dir:'ltr'},de:{name:'Deutsch',dir:'ltr'},it:{name:'Italiano',dir:'ltr'},es:{name:'Español',dir:'ltr'},zh:{name:'中文',dir:'ltr'},ja:{name:'日本語',dir:'ltr'},ko:{name:'한국어',dir:'ltr'},ru:{name:'Русский',dir:'ltr'},tr:{name:'Türkçe',dir:'ltr'},pt:{name:'Português',dir:'ltr'},he:{name:'עברית',dir:'rtl'},fa:{name:'فارسی',dir:'rtl'},ur:{name:'اردو',dir:'rtl'},amazigh:{name:'Tamaziɣt',dir:'ltr'}};
const LANGUAGE_HINTS=[{key:'zh',rx:/الصينية|صيني|الصيني|chinese|mandarin|中文|汉语|漢語/},{key:'ja',rx:/اليابانية|ياباني|japanese|日本語/},{key:'ko',rx:/الكورية|كوري|korean|한국어/},{key:'es',rx:/الإسبانية|الاسبانية|إسباني|اسباني|spanish|español|castellano/},{key:'ru',rx:/الروسية|روسي|russian|русский/},{key:'tr',rx:/التركية|تركي|turkish|türkçe/},{key:'pt',rx:/البرتغالية|برتغالي|portuguese|português/},{key:'de',rx:/الألمانية|الالمانية|ألماني|الماني|deutsch|german|allemand/},{key:'it',rx:/الإيطالية|الايطالية|إيطالي|ايطالي|italiano|italian/},{key:'en',rx:/الإنجليزية|الانقليزية|الانجليزية|إنقليزية|إنجليزية|انقليزية|english|anglais/},{key:'fr',rx:/الفرنسية|فرنسي|français|francais|french|économie|economie|pib/},{key:'he',rx:/العبرية|عبري|hebrew|עברית/},{key:'fa',rx:/الفارسية|فارسي|persian|farsi|فارسی/},{key:'ur',rx:/الأردية|الاردية|أردو|اردو|urdu|اردو/},{key:'amazigh',rx:/الأمازيغية|الامازيغية|أمازيغية|امازيغية|tamazight|tamaziɣt/},{key:'ar',rx:/العربية|لغة عربية|التربية الإسلامية|التربية الاسلامية|إسلامية|اسلامية|الإيقاظ العلمي|الرياضيات|التاريخ|الجغرافيا|التربية المدنية/}];
const FIXED={fr:{'السنة الثانية ثانوي':'2e année secondaire','45 دقيقة':'45 minutes','المقاربة بالكفاءات':'approche par compétences'},en:{'السنة الثانية ثانوي':'2nd year secondary','45 دقيقة':'45 minutes','المقاربة بالكفاءات':'competency-based approach'},es:{'السنة الثانية ثانوي':'2.º año de secundaria','45 دقيقة':'45 minutos','المقاربة بالكفاءات':'enfoque por competencias'},zh:{'السنة الثانية ثانوي':'高中二年级','45 دقيقة':'45分钟','المقاربة بالكفاءات':'基于能力的教学法'}};
function selectedMode(){return document.querySelector('input[name="mode"]:checked')?.value||'title'}function toggleSource(){G('sourceBox').style.display=selectedMode()==='source'?'block':'none'}function getForm(){return{matiere:G('f_matiere').value.trim(),niveau:G('f_niveau').value,titre:G('f_titre').value.trim(),duree:G('f_duree').value,approche:G('f_approche').value,prereq:G('f_prereq').value.trim(),moyens:G('f_moyens').value.trim(),notes:G('f_notes').value.trim(),lessonText:G('f_lessonText').value.trim(),mode:selectedMode()}}
function detectLanguage(input){const subject=(input.matiere||'').toLowerCase(),combined=((input.matiere||'')+' '+(input.titre||'')+' '+(input.lessonText||'')).toLowerCase();for(const item of LANGUAGE_HINTS){if(item.rx.test(subject))return {key:item.key,...KNOWN[item.key]}}for(const item of LANGUAGE_HINTS){if(item.rx.test(combined))return {key:item.key,...KNOWN[item.key]}}if(/[\u0600-\u06ff]/.test(combined)&&!/[a-zàâçéèêëîïôùûüÿñæœ]/i.test(combined))return {key:'ar',...KNOWN.ar};if(/[àâçéèêëîïôùûüÿœæ]/i.test(combined))return {key:'fr',...KNOWN.fr};if(/[a-z]/i.test(combined))return {key:'en',...KNOWN.en};return {key:'ar',...KNOWN.ar}}
function trFixed(v,key){return key==='ar'?v:(FIXED[key]&&FIXED[key][v])||v}function localizeInput(input,target){const out={...input};out.niveau=trFixed(input.niveau,target.key);out.duree=trFixed(input.duree,target.key);out.approche=trFixed(input.approche,target.key);return out}function setOutputDirection(target){G('outBody').style.direction=target.dir||'ltr';G('outBody').style.textAlign=(target.dir==='rtl')?'right':'left'}function setLoading(on){G('genBtn').disabled=on;G('spin').style.display=on?'inline-block':'none';G('btnTxt').textContent=on?'جارٍ التوليد...':'توليد الجذاذة'}function showErr(msg){G('errTxt').textContent=msg;G('errCard').style.display='block'}function animateText(text,done){const body=G('outBody');body.innerHTML='';let i=0,cur=document.createElement('span');cur.className='cursor';(function tick(){if(i<text.length){body.textContent=text.slice(0,i+=10);body.appendChild(cur);setTimeout(tick,5)}else{body.textContent=text;done&&done()}})()}function buildMeta(form,target){const view=localizeInput(form,target),today=new Date().toLocaleDateString('ar-TN',{year:'numeric',month:'long',day:'numeric'});G('metaStrip').innerHTML=[{l:view.matiere,hi:true},{l:view.niveau},{l:view.duree},{l:today}].map(p=>`<span class="pill${p.hi?' hi':''}">${escapeHtml(p.l)}</span>`).join('')}async function doCopy(btn){const txt=G('outBody').textContent;try{await navigator.clipboard.writeText(txt)}catch{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}const old=btn.innerHTML;btn.innerHTML='تم النسخ';btn.classList.add('ok');setTimeout(()=>{btn.innerHTML=old;btn.classList.remove('ok')},1500)}function downloadTxt(){const txt=G('outBody').textContent.trim();if(!txt){showErr('لا توجد جذاذة للتحميل.');return}const blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jathatha.txt';document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove()}function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function normalizeError(msg){if(/permission|403|401|not.*enabled/i.test(msg))return'يجب تفعيل خدمة الذكاء الاصطناعي في إعدادات المشروع.';if(/quota|429|rate/i.test(msg))return'تم تجاوز حد الاستعمال المجاني أو الحد المسموح.';if(/model|404/i.test(msg))return'النموذج غير متاح حالياً. حاول لاحقاً.';if(/init|config|firebase/i.test(msg))return'لم أستطع قراءة إعدادات المشروع. جرّب بعد النشر على رابط الاستضافة.';return msg}document.addEventListener('keydown',e=>{if(e.ctrlKey&&e.key==='Enter')doGenerate()});
</script>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js';
import { getAI, getGenerativeModel, GoogleAIBackend } from 'https://www.gstatic.com/firebasejs/12.6.0/firebase-ai.js';
let firebaseApp=null;async function getFirebaseApp(){if(firebaseApp)return firebaseApp;const resp=await fetch('/__/firebase/init.json',{cache:'no-store'});if(!resp.ok)throw new Error('Firebase init config not available');const cfg=await resp.json();firebaseApp=initializeApp(cfg);return firebaseApp}function structureInstruction(target){return `Use the standard pedagogical lesson-plan structure, translated fully into ${target.name}: lesson plan heading; general information with subject, level, lesson, duration, teaching approach; target competency; operational objectives; prerequisites; teaching aids; lesson procedure; assessment; summary; pedagogical guidance. Fill all sections with real content.`}function buildPrompt(input,target){const view=localizeInput(input,target),source=input.mode==='source'&&input.lessonText?`\nنص الدرس/المصدر المعتمد:\n${input.lessonText}`:'';return `أنت خبير تربوي متخصص في إعداد الجذاذات. أنشئ جذاذة تربوية كاملة.\n\nتعليمات اللغة - إلزامية جداً:\n- لغة الجذاذة المطلوبة هي: ${target.name}.\n- اكتب الجذاذة النهائية كاملة بهذه اللغة فقط.\n- إذا كانت المادة مكتوبة بالعربية كاسم لغة، مثل الصينية أو الإسبانية أو الروسية، فاكتب الجذاذة بلغة تلك المادة نفسها لا بالعربية.\n- لا تترك عناوين عربية ولا قيماً عربية داخل الجذاذة إذا كانت اللغة المطلوبة غير العربية.\n\nالمعطيات:\n- المادة الأصلية: ${input.matiere}\n- المادة المستعملة في الجذاذة: ${view.matiere}\n- المستوى الأصلي: ${input.niveau}\n- المستوى المستعمل: ${view.niveau}\n- الدرس: ${input.titre}\n- المدة: ${view.duree}\n- الطريقة: ${view.approche}\n- المكتسبات القبلية: ${input.prereq||'غير محددة'}\n- الوسائل: ${input.moyens||'وسائل القسم المعتادة'}\n${input.notes?'- ملاحظات خاصة: '+input.notes:''}${source}\n\nقيود تربوية:\n- التزم حصراً بعنوان الدرس.\n- لا تضف دروساً أخرى.\n- اجعل المحتوى صالحاً مباشرة لكراس إعداد الدروس والطباعة.\n\n${structureInstruction(target)}\n\nاكتب النتيجة النهائية مباشرة دون مقدمة خارجية.`}window.doGenerate=async function(){const form=getForm(),target=detectLanguage(form);G('errCard').style.display='none';if(!form.matiere||!form.niveau||!form.titre){showErr('يرجى ملء الحقول الإلزامية.');return}setLoading(true);setOutputDirection(target);G('welcomeCard').style.display='none';G('outCard').style.display='block';G('outBody').innerHTML='<span class="cursor"></span>';G('metaStrip').innerHTML='';try{const app=await getFirebaseApp(),ai=getAI(app,{backend:new GoogleAIBackend()}),model=getGenerativeModel(ai,{model:MODEL_NAME,generationConfig:{temperature:0.25,topP:0.9,maxOutputTokens:4500},systemInstruction:`أنت مساعد تربوي محترف. يجب أن تكتب الناتج كاملاً بلغة واحدة فقط هي: ${target.name}.`}),result=await model.generateContent(buildPrompt(form,target)),text=(result.response.text()||'').trim();if(!text)throw new Error('لم يتم استلام أي محتوى.');animateText(text,()=>{buildMeta(form,target);setLoading(false)})}catch(e){showErr(normalizeError(e.message||String(e)||'تعذّر التوليد.'));G('outCard').style.display='none';G('welcomeCard').style.display='block';setLoading(false)}}
</script>
</body>
</html>
