<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<title>مولّد الجذاذات التربوية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#060b16;--panel:#ffffff;--panel2:#f7f8fb;--text:#0f172a;--muted:#64748b;--line:#e5e7eb;--gold:#d5a754;--cyan:#39d7c8;--blue:#2f6df6;--navy:#0f172a;--red:#9f1239;--green:#166534;--shadow:0 30px 90px rgba(2,6,23,.28);--soft:0 16px 40px rgba(2,6,23,.12)}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Cairo',sans-serif;background:radial-gradient(circle at 15% 12%,rgba(213,167,84,.24),transparent 22%),radial-gradient(circle at 86% 18%,rgba(57,215,200,.16),transparent 24%),radial-gradient(circle at 70% 92%,rgba(47,109,246,.17),transparent 28%),linear-gradient(135deg,#060b16,#0d172d 55%,#10273a);min-height:100vh;color:var(--text);direction:rtl;line-height:1.7}.nav{position:sticky;top:0;z-index:20;background:rgba(6,11,22,.62);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,.08)}.navin{width:min(1180px,100%);margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}.brand{display:flex;align-items:center;gap:12px;color:#fff}.logo{width:38px;height:38px;border-radius:16px;background:linear-gradient(135deg,#f6d991,#b9812d);box-shadow:0 0 0 8px rgba(213,167,84,.13)}.brand b{font-family:'Amiri',serif;font-size:27px}.tag{color:rgba(255,255,255,.58);font-size:12px;font-weight:800;border:1px solid rgba(255,255,255,.1);border-radius:999px;padding:7px 12px}.shell{width:min(1180px,100%);margin:auto;padding:30px 18px 64px}.studio{display:grid;grid-template-columns:420px minmax(0,1fr);gap:22px;align-items:start}.intro{padding:34px 26px 26px;color:#fff;border:1px solid rgba(255,255,255,.11);background:linear-gradient(145deg,rgba(255,255,255,.10),rgba(255,255,255,.035));border-radius:34px;box-shadow:var(--shadow);backdrop-filter:blur(18px);position:relative;overflow:hidden}.intro:before{content:'';position:absolute;inset:auto -90px -90px auto;width:230px;height:230px;border-radius:50%;background:radial-gradient(circle,rgba(57,215,200,.18),transparent 68%)}.overline{display:inline-flex;color:#f2cf8a;font-weight:900;font-size:13px;margin-bottom:14px}.intro h1{font-family:'Amiri',serif;font-size:clamp(38px,8vw,66px);line-height:1.05;margin-bottom:14px}.intro p{color:rgba(255,255,255,.72);font-size:15px;max-width:360px}.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:28px}.mini{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);border-radius:22px;padding:14px}.mini strong{display:block;color:#fff;font-size:15px}.mini span{display:block;color:rgba(255,255,255,.55);font-size:11px;margin-top:2px}.card{background:rgba(255,255,255,.92);border:1px solid rgba(255,255,255,.45);border-radius:34px;box-shadow:var(--shadow);backdrop-filter:blur(18px);overflow:hidden}.composer{padding:22px}.head{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:20px}.head-title{font-size:24px;font-weight:900;color:#0f172a}.head-sub{font-size:12px;color:var(--muted);font-weight:700}.field{margin-bottom:14px}.field label{display:block;margin-bottom:7px;font-size:13px;font-weight:900;color:#334155}.req{color:#b7791f}input,select,textarea{width:100%;font-family:'Cairo',sans-serif;border:1px solid #e2e8f0;background:#fff;color:#0f172a;border-radius:18px;padding:14px 15px;font-size:15px;outline:none;transition:.18s;direction:rtl}textarea{min-height:108px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:rgba(47,109,246,.45);box-shadow:0 0 0 4px rgba(47,109,246,.12)}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.switch{display:grid;grid-template-columns:1fr 1fr;background:#eef2f7;border:1px solid #e2e8f0;border-radius:20px;padding:7px;gap:7px}.switch label{position:relative;margin:0}.switch input{position:absolute;inset:0;opacity:0}.switch span{display:flex;align-items:center;justify-content:center;text-align:center;min-height:46px;border-radius:15px;color:#64748b;font-weight:900;font-size:13px}.switch input:checked+span{background:#fff;color:#0f172a;box-shadow:0 8px 20px rgba(15,23,42,.08)}.sep{height:1px;background:linear-gradient(90deg,transparent,#e2e8f0,transparent);margin:16px 0}.btn{width:100%;min-height:58px;border:0;border-radius:20px;background:linear-gradient(135deg,#0f172a,#1d4ed8 58%,#0f766e);color:#fff;font-family:'Cairo',sans-serif;font-size:17px;font-weight:900;box-shadow:0 18px 42px rgba(29,78,216,.25);display:flex;align-items:center;justify-content:center;gap:10px}.btn:disabled{opacity:.65}.spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.34);border-top-color:white;border-radius:50%;display:none;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.result{margin-top:22px}.err{display:none;background:#fff1f2;color:var(--red);border:1px solid #fecdd3;border-radius:18px;padding:13px 15px;margin-bottom:14px;font-weight:800}.preview{min-height:560px;display:flex;flex-direction:column}.bar{padding:16px 18px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}.bar b{font-size:19px}.actions{display:flex;gap:8px;flex-wrap:wrap}.act{font-family:'Cairo',sans-serif;border:1px solid #e2e8f0;background:#fff;color:#334155;border-radius:13px;padding:9px 13px;font-weight:900}.act.dark{background:#0f172a;color:#fff;border-color:#0f172a}.act.ok{background:var(--green);color:#fff;border-color:var(--green)}.meta{display:flex;gap:7px;flex-wrap:wrap;padding:12px 18px 0}.pill{font-size:11px;font-weight:900;background:#f8fafc;border:1px solid #e2e8f0;color:#475569;border-radius:999px;padding:5px 10px}.doc-wrap{padding:18px;flex:1}.doc{min-height:100%;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid #e2e8f0;border-radius:26px;padding:32px 26px;position:relative}.doc:before{content:'';position:absolute;top:18px;right:18px;left:18px;border-top:3px double rgba(15,23,42,.12)}.empty{min-height:430px;display:flex;align-items:center;justify-content:center;text-align:center;color:#94a3b8;font-weight:900}.output{display:none;white-space:pre-wrap;line-height:2.05;font-size:14px;padding-top:13px;color:#0f172a}.cursor{display:inline-block;width:2px;height:16px;background:#1d4ed8;animation:blink .9s step-end infinite}@keyframes blink{50%{opacity:0}}.footer{text-align:center;color:rgba(255,255,255,.45);font-size:11px;margin-top:18px}@media(max-width:980px){.studio{grid-template-columns:1fr}.intro{padding:28px 22px}.mini-grid{grid-template-columns:1fr 1fr}.preview{min-height:auto}}@media(max-width:640px){.tag{display:none}.brand b{font-size:22px}.shell{padding:20px 12px 46px}.intro h1{font-size:44px}.mini-grid{display:none}.composer{padding:18px}.row{grid-template-columns:1fr}.bar{align-items:stretch}.actions .act{flex:1}.doc{padding:28px 18px}.doc-wrap{padding:14px}}@media print{.nav,.intro,.composer,.bar,.meta,.footer,.err{display:none!important}body{background:white}.shell{padding:0}.studio{display:block}.card{box-shadow:none;border:none;background:white}.preview{min-height:auto}.doc-wrap{padding:0}.doc{border:0;border-radius:0;padding:0}.doc:before{display:none}.output{display:block!important;padding:0;font-size:12px;line-height:1.85}.empty{display:none!important}}
</style>
</head>
<body>
<header class="nav"><div class="navin"><span class="tag">Studio</span><div class="brand"><span class="logo"></span><b>مولّد الجذاذات التربوية</b></div></div></header>
<main class="shell"><div class="studio"><section class="intro"><div class="overline">واجهة تحضير ذكية</div><h1>استوديو إعداد الجذاذات</h1><p></p><div class="mini-grid"><div class="mini"><strong>تنظيم</strong><span>صياغة تربوية واضحة</span></div><div class="mini"><strong>طباعة</strong><span>معاينة وثيقة مرتبة</span></div></div></section><section><div class="card composer"><div id="errCard" class="err">حدث خطأ.</div><div class="head"><div><div class="head-title">إعداد الدرس</div><div class="head-sub"></div></div></div><div class="field"><label>المادة الدراسية <span class="req">*</span></label><input id="f_matiere" type="text"></div><div class="field"><label>المستوى الدراسي <span class="req">*</span></label><select id="f_niveau"><option value="">— اختر المستوى —</option><optgroup label="الابتدائي"><option>السنة الأولى ابتدائي</option><option>السنة الثانية ابتدائي</option><option>السنة الثالثة ابتدائي</option><option>السنة الرابعة ابتدائي</option><option>السنة الخامسة ابتدائي</option><option>السنة السادسة ابتدائي</option></optgroup><optgroup label="الإعدادي"><option>السنة السابعة أساسي</option><option>السنة الثامنة أساسي</option><option>السنة التاسعة أساسي</option></optgroup><optgroup label="الثانوي"><option>السنة الأولى ثانوي</option><option>السنة الثانية ثانوي</option><option>السنة الثالثة ثانوي</option><option>السنة الرابعة ثانوي — بكالوريا</option></optgroup></select></div><div class="field"><label>عنوان الدرس <span class="req">*</span></label><input id="f_titre" type="text"></div><div class="row"><div class="field"><label>مدة الحصة</label><select id="f_duree"><option>30 دقيقة</option><option selected>45 دقيقة</option><option>55 دقيقة</option><option>60 دقيقة</option><option>90 دقيقة</option></select></div><div class="field"><label>طريقة التدريس</label><select id="f_approche"><option>المقاربة بالكفاءات</option><option>التعلم النشط</option><option>التعلم التعاوني</option><option>حل المشكلات</option><option>الاكتشاف الموجه</option><option>المقاربة النصية</option><option>التعليم المباشر</option></select></div></div><div class="field"><label>طريقة التوليد</label><div class="switch"><label><input type="radio" name="mode" value="title" checked onchange="toggleSource()"><span>من العنوان</span></label><label><input type="radio" name="mode" value="source" onchange="toggleSource()"><span>من النص</span></label></div></div><div id="sourceBox" class="field" style="display:none"><label>نص الدرس</label><textarea id="f_lessonText"></textarea></div><div class="sep"></div><div class="field"><label>المكتسبات القبلية</label><input id="f_prereq" type="text"></div><div class="field"><label>الوسائل المتاحة</label><input id="f_moyens" type="text"></div><div class="field"><label>ملاحظات خاصة</label><textarea id="f_notes"></textarea></div><button class="btn" id="genBtn" onclick="doGenerate()"><span id="spin" class="spin"></span><span id="btnTxt">توليد الجذاذة</span></button></div><div class="result card preview"><div class="bar"><b>معاينة الجذاذة</b><div class="actions"><button class="act" onclick="doCopy(this)">نسخ</button><button class="act" onclick="downloadTxt()">تحميل</button><button class="act" onclick="window.print()">طباعة</button><button class="act dark" onclick="doGenerate()">توليد جديد</button></div></div><div class="meta" id="metaStrip"></div><div class="doc-wrap"><div class="doc"><div id="emptyState" class="empty">ستظهر الجذاذة هنا</div><div id="outBody" class="output"></div></div></div></div></section></div><div class="footer">walid ben jemaa</div></main>
<script>
const G=id=>document.getElementById(id),MODEL_NAME='gemini-3.5-flash';
const KNOWN={ar:{name:'العربية',dir:'rtl'},fr:{name:'Français',dir:'ltr'},en:{name:'English',dir:'ltr'},de:{name:'Deutsch',dir:'ltr'},it:{name:'Italiano',dir:'ltr'},es:{name:'Español',dir:'ltr'},zh:{name:'中文',dir:'ltr'},ja:{name:'日本語',dir:'ltr'},ko:{name:'한국어',dir:'ltr'},ru:{name:'Русский',dir:'ltr'},tr:{name:'Türkçe',dir:'ltr'},pt:{name:'Português',dir:'ltr'},he:{name:'עברית',dir:'rtl'},fa:{name:'فارسی',dir:'rtl'},ur:{name:'اردو',dir:'rtl'},amazigh:{name:'Tamaziɣt',dir:'ltr'}};
const LANGUAGE_HINTS=[{key:'zh',rx:/الصينية|صيني|الصيني|chinese|mandarin|中文|汉语|漢語/i},{key:'ja',rx:/اليابانية|ياباني|japanese|日本語/i},{key:'ko',rx:/الكورية|كوري|korean|한국어/i},{key:'es',rx:/الإسبانية|الاسبانية|إسباني|اسباني|spanish|español|castellano/i},{key:'ru',rx:/الروسية|روسي|russian|русский/i},{key:'tr',rx:/التركية|تركي|turkish|türkçe/i},{key:'pt',rx:/البرتغالية|برتغالي|portuguese|português/i},{key:'de',rx:/الألمانية|الالمانية|ألماني|الماني|deutsch|german|allemand/i},{key:'it',rx:/الإيطالية|الايطالية|إيطالي|ايطالي|italiano|italian/i},{key:'en',rx:/الإنجليزية|الانقليزية|الانجليزية|إنقليزية|إنجليزية|انقليزية|english|anglais/i},{key:'fr',rx:/الفرنسية|فرنسي|français|francais|french|économie|economie|pib/i},{key:'he',rx:/العبرية|عبري|hebrew|עברית/i},{key:'fa',rx:/الفارسية|فارسي|persian|farsi|فارسی/i},{key:'ur',rx:/الأردية|الاردية|أردو|اردو|urdu/i},{key:'amazigh',rx:/الأمازيغية|الامازيغية|أمازيغية|امازيغية|tamazight|tamaziɣt/i},{key:'ar',rx:/العربية|لغة عربية|التربية الإسلامية|التربية الاسلامية|إسلامية|اسلامية|الإيقاظ العلمي|الرياضيات|التاريخ|الجغرافيا|التربية المدنية/i}];
const FIXED={fr:{'السنة الثانية ثانوي':'2e année secondaire','45 دقيقة':'45 minutes','المقاربة بالكفاءات':'approche par compétences'},en:{'السنة الثانية ثانوي':'2nd year secondary','45 دقيقة':'45 minutes','المقاربة بالكفاءات':'competency-based approach'},es:{'السنة الثانية ثانوي':'2.º año de secundaria','45 دقيقة':'45 minutos','المقاربة بالكفاءات':'enfoque por competencias'},zh:{'السنة الثانية ثانوي':'高中二年级','45 دقيقة':'45分钟','المقاربة بالكفاءات':'基于能力的教学法'}};
function selectedMode(){return document.querySelector('input[name="mode"]:checked')?.value||'title'}function toggleSource(){G('sourceBox').style.display=selectedMode()==='source'?'block':'none'}function getForm(){return{matiere:G('f_matiere').value.trim(),niveau:G('f_niveau').value,titre:G('f_titre').value.trim(),duree:G('f_duree').value,approche:G('f_approche').value,prereq:G('f_prereq').value.trim(),moyens:G('f_moyens').value.trim(),notes:G('f_notes').value.trim(),lessonText:G('f_lessonText').value.trim(),mode:selectedMode()}}function detectLanguage(input){const subject=(input.matiere||'').toLowerCase(),combined=((input.matiere||'')+' '+(input.titre||'')+' '+(input.lessonText||'')).toLowerCase();for(const item of LANGUAGE_HINTS){if(item.rx.test(subject))return{key:item.key,...KNOWN[item.key]}}for(const item of LANGUAGE_HINTS){if(item.rx.test(combined))return{key:item.key,...KNOWN[item.key]}}if(/[\u0600-\u06ff]/.test(combined)&&!/[a-zàâçéèêëîïôùûüÿñæœ]/i.test(combined))return{key:'ar',...KNOWN.ar};if(/[àâçéèêëîïôùûüÿœæ]/i.test(combined))return{key:'fr',...KNOWN.fr};if(/[a-z]/i.test(combined))return{key:'en',...KNOWN.en};return{key:'ar',...KNOWN.ar}}function trFixed(v,key){return key==='ar'?v:(FIXED[key]&&FIXED[key][v])||v}function localizeInput(input,target){return{...input,niveau:trFixed(input.niveau,target.key),duree:trFixed(input.duree,target.key),approche:trFixed(input.approche,target.key)}}function setOutputDirection(t){G('outBody').style.direction=t.dir||'ltr';G('outBody').style.textAlign=t.dir==='rtl'?'right':'left'}function setLoading(on){G('genBtn').disabled=on;G('spin').style.display=on?'inline-block':'none';G('btnTxt').textContent=on?'جارٍ التوليد...':'توليد الجذاذة'}function showErr(msg){G('errCard').textContent=msg;G('errCard').style.display='block'}function hideErr(){G('errCard').style.display='none'}function escapeHtml(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function animateText(text,done){const body=G('outBody');body.innerHTML='';let i=0,cur=document.createElement('span');cur.className='cursor';(function tick(){if(i<text.length){body.textContent=text.slice(0,i+=10);body.appendChild(cur);setTimeout(tick,5)}else{body.textContent=text;done&&done()}})()}function buildMeta(form,target){const v=localizeInput(form,target),today=new Date().toLocaleDateString('ar-TN',{year:'numeric',month:'long',day:'numeric'});G('metaStrip').innerHTML=[v.matiere,v.niveau,v.duree,target.name,today].filter(Boolean).map(x=>`<span class="pill">${escapeHtml(x)}</span>`).join('')}async function doCopy(btn){const txt=G('outBody').textContent.trim();if(!txt){showErr('لا توجد جذاذة للنسخ.');return}try{await navigator.clipboard.writeText(txt)}catch{const t=document.createElement('textarea');t.value=txt;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove()}const old=btn.textContent;btn.textContent='تم النسخ';btn.classList.add('ok');setTimeout(()=>{btn.textContent=old;btn.classList.remove('ok')},1400)}function downloadTxt(){const txt=G('outBody').textContent.trim();if(!txt){showErr('لا توجد جذاذة للتحميل.');return}const blob=new Blob([txt],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='jathatha.txt';document.body.appendChild(a);a.click();URL.revokeObjectURL(a.href);a.remove()}function normalizeError(msg){if(/permission|403|401|not.*enabled/i.test(msg))return'يجب تفعيل خدمة الذكاء الاصطناعي في إعدادات المشروع.';if(/quota|429|rate/i.test(msg))return'تم تجاوز الحد المسموح أو الحصة المجانية.';if(/model|404/i.test(msg))return'النموذج غير متاح حالياً.';if(/init|config|firebase/i.test(msg))return'تعذّر تحميل إعدادات Firebase.';return msg||'تعذّر التوليد.'}toggleSource();
</script>
<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js';import{getAI,getGenerativeModel,GoogleAIBackend}from'https://www.gstatic.com/firebasejs/12.6.0/firebase-ai.js';let firebaseApp=null;async function getFirebaseApp(){if(firebaseApp)return firebaseApp;const resp=await fetch('/__/firebase/init.json',{cache:'no-store'});if(!resp.ok)throw new Error('Firebase init config not available');const cfg=await resp.json();firebaseApp=initializeApp(cfg);return firebaseApp}function structureInstruction(t){return`Use a standard pedagogical lesson-plan structure translated fully into ${t.name}: lesson plan title; general information; target competency; operational objectives; prerequisites; teaching aids; lesson phases; assessment; summary; pedagogical guidance. Content must be classroom-ready.`}function buildPrompt(input,target){const view=localizeInput(input,target),source=input.mode==='source'&&input.lessonText?`\nنص الدرس/المصدر المعتمد:\n${input.lessonText}`:'';return`أنت خبير تربوي متخصص في إعداد الجذاذات.\n\nتعليمات إلزامية:\n- لغة الجذاذة المطلوبة هي: ${target.name}.\n- اكتب الناتج النهائي كاملاً بهذه اللغة فقط.\n- إذا كانت المادة مكتوبة بالعربية كاسم لغة مثل الصينية أو الإسبانية أو الروسية، فاكتب الجذاذة بلغة تلك المادة نفسها.\n- لا تترك عناوين عربية أو قيماً عربية داخل الجذاذة إذا كانت اللغة المطلوبة غير العربية.\n\nالمعطيات:\n- المادة الأصلية: ${input.matiere}\n- المادة المستعملة في الجذاذة: ${view.matiere}\n- المستوى الأصلي: ${input.niveau}\n- المستوى المستعمل: ${view.niveau}\n- عنوان الدرس: ${input.titre}\n- المدة: ${view.duree}\n- طريقة التدريس: ${view.approche}\n- المكتسبات القبلية: ${input.prereq||'غير محددة'}\n- الوسائل المتاحة: ${input.moyens||'وسائل القسم المعتادة'}\n${input.notes?'- ملاحظات خاصة: '+input.notes:''}${source}\n\nقيود:\n- التزم حصراً بعنوان الدرس.\n- لا تضف دروساً أخرى.\n- اجعل الجذاذة جاهزة مباشرة للاستعمال والطباعة.\n\n${structureInstruction(target)}\n\nاكتب النتيجة النهائية مباشرة دون مقدمة خارجية.`}window.doGenerate=async function(){const form=getForm(),target=detectLanguage(form);hideErr();if(!form.matiere||!form.niveau||!form.titre){showErr('يرجى ملء الحقول الإلزامية.');return}setLoading(true);G('emptyState').style.display='none';G('outBody').style.display='block';G('outBody').innerHTML='<span class="cursor"></span>';setOutputDirection(target);G('metaStrip').innerHTML='';try{const app=await getFirebaseApp(),ai=getAI(app,{backend:new GoogleAIBackend()}),model=getGenerativeModel(ai,{model:MODEL_NAME,generationConfig:{temperature:.25,topP:.9,maxOutputTokens:4500},systemInstruction:`أنت مساعد تربوي محترف. يجب أن تكتب الناتج كاملاً بلغة واحدة فقط هي: ${target.name}.`}),result=await model.generateContent(buildPrompt(form,target)),text=(result.response.text()||'').trim();if(!text)throw new Error('لم يتم استلام أي محتوى.');animateText(text,()=>{buildMeta(form,target);setLoading(false)})}catch(e){showErr(normalizeError(e.message||String(e)));G('outBody').style.display='none';G('emptyState').style.display='flex';setLoading(false)}};
</script>
